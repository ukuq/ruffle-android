name: Lint & Format

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NDK_VERSION: "r27"
  CARGO_NDK_VERSION: "4.1.2"

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Checkout Ruffle dependency
        run: |
          rm -rf ../ruffle
          git clone --depth 1 --branch master1 https://github.com/ukuq/ruffle.git ../ruffle

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: Install Rust toolchain
        run: |
          rustup show
          rustup target add aarch64-linux-android
          rustup component add rustfmt clippy

      - name: Cache Cargo output
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Install cargo-ndk
        run: cargo install cargo-ndk@${{ env.CARGO_NDK_VERSION }} --locked

      - name: Clean up NDKs
        run: |
          rm -rf $ANDROID_NDK_HOME
          rm -rf $ANDROID_NDK_LATEST_HOME

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          link-to-sdk: true

      - name: Check clippy
        run: |
          unset ANDROID_SDK_ROOT
          cargo ndk --target arm64-v8a --platform 26 -- clippy --all --all-features --tests -- -D warnings
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}

  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Checkout Ruffle dependency
        run: |
          rm -rf ../ruffle
          git clone --depth 1 --branch master1 https://github.com/ukuq/ruffle.git ../ruffle

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/wrapper-validation@v6
        name: Validate Gradle Wrapper

      - name: Check ktlint
        run: ./gradlew ktlintCheck

      - name: Check lint
        run: ./gradlew lint
